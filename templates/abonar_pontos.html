<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Abonar Pontos da Equipe</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #1E2A38;
            margin: 0;
            display: flex;
        }

        .sidebar {
            width: 200px;
            background-color: #1E2A38;
            padding: 20px 10px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            box-shadow: 3px 0 10px rgba(0,0,0,0.3);
            min-height: 100vh;
        }

        .sidebar a {
            background-color: #2F80ED10;
            color: #ffffff;
            padding: 10px 12px;
            font-size: 14px;
            text-align: center;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 500;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: inset 0 0 10px rgba(255, 255, 255, 0.05);
        }

        .sidebar a:hover {
            background-color: #2F80ED30;
        }

        .main-content {
            flex: 1;
            padding: 40px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .container {
            max-width: 700px;
            width: 100%;
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
        }

        h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #1E2A38;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        label {
            font-weight: 600;
            color: #333;
        }

        select, input[type="date"], textarea, button {
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 15px;
        }

        button {
            background-color: #1E2A38;
            color: white;
            font-weight: bold;
            border: none;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background-color: #16212c;
        }

        .voltar {
            margin-top: 30px;
            text-align: center;
        }

        .voltar a {
            color: #2F80ED;
            text-decoration: none;
            font-weight: 500;
        }

        .voltar a:hover {
            text-decoration: underline;
        }

        .flash {
            padding: 12px;
            margin-bottom: 20px;
            border-radius: 8px;
            font-weight: bold;
            text-align: center;
        }

        .flash.success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .flash.warning {
            background-color: #fff3cd;
            color: #856404;
            border: 1px solid #ffeeba;
        }

        .flash.error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>
<body>
<div class="sidebar">
    <a href="/">🏠 Início</a>
    <a href="{{ url_for('visualizar_pontos') }}">📋 Visualizar Pontos</a>
    <a href="{{ url_for('logout') }}">⬅ Sair</a>
</div>

<div class="main-content">
    <div class="container">
        <h2>✅ Abonar Pontos do Colaborador</h2>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="flash {{ category }}">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('abonar_todos_os_pontos') }}">
            <label for="usuario_id">Selecionar Colaborador:</label>
            <select name="usuario_id" id="usuario_id" required>
                <option value="">-- Selecione --</option>
                {% for u in usuarios %}
                    <option value="{{ u.ID }}">{{ u.Nome }}</option>
                {% endfor %}
            </select>

            <label for="data">Data do Registro:</label>
            <input type="date" name="data" id="data" required>

            <label for="motivo">Motivo do Abono:</label>
            <textarea name="motivo" id="motivo" required rows="4" placeholder="Descreva o motivo do abono..."></textarea>

            <button type="submit">Abonar Todos os Pontos do Dia</button>
        </form>

        <div class="voltar">
            <a href="{{ url_for('visualizar_pontos') }}">← Voltar</a>
        </div>
    </div>
</div>
</body>
</html>
